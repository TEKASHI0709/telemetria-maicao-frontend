<div class="add-tank-page" *ngIf="!success">
  <h2 class="page-title">Conectar Nuevo Tanque</h2>

  <div class="connection-card">
    <div class="connection-icons">
      <div class="icon-box phone">📱</div>
      <div class="connection-line">
        <span class="line-label">WiFi</span>
      </div>
      <div class="icon-box sensor">📡</div>
    </div>
    <p class="connection-text">Teléfono ↔ Sensor IoT (ESP32)</p>
  </div>

  <form class="tank-form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nombre de la familia</label>
      <input type="text" [(ngModel)]="location" name="location" placeholder="Ej: Familia García" required>
    </div>

    <div class="form-group">
      <label>Nombre del tanque</label>
      <input type="text" [(ngModel)]="name" name="name" placeholder="Ej: Tanque Principal" required>
    </div>

    <div class="form-group">
      <label>Capacidad (litros)</label>
      <input type="number" [(ngModel)]="capacity" name="capacity" placeholder="Ej: 1100" required>
    </div>

    <div class="form-group">
      <label>Altura del tanque (cm)</label>
      <input type="number" [(ngModel)]="height" name="height" placeholder="Ej: 200" required>
    </div>

    <button type="submit" class="submit-btn" [disabled]="loading">
      <span *ngIf="!loading">📡 Emparejar Sensor</span>
      <span *ngIf="loading">Conectando...</span>
    </button>

    <p class="error" *ngIf="error">{{ error }}</p>
  </form>
</div>

<div class="success-screen" *ngIf="success">
  <div class="check-container">
    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
      <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
      <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
    </svg>
  </div>
  <h2 class="success-title">¡Tanque agregado!</h2>
  <p class="success-text">Redirigiendo al dashboard...</p>
</div>
