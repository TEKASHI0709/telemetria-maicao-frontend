<div class="app-container">
  <header class="app-header">
    <div class="header-left">
      <h1>Telemetría Maicao</h1>
      <p>Bienvenido de vuelta</p>
    </div>
    <div class="header-right">
      <button class="icon-btn" (click)="toggleTheme()">
        <span *ngIf="theme === 'dark'">☀️</span>
        <span *ngIf="theme === 'light'">🌙</span>
      </button>
      <button class="icon-btn notification-btn">
        🔔
        <span class="badge">{{ alertCount }}</span>
      </button>
      <button class="icon-btn wifi-btn">📶</button>
    </div>
  </header>

  <main class="app-content">
    <router-outlet />
  </main>

  <nav class="bottom-nav">
    <button class="nav-item" [class.active]="activeTab === 'inicio'" (click)="navigate('dashboard', 'inicio')">
      <span class="nav-icon">⊞</span>
      <span class="nav-label">Inicio</span>
    </button>
    <button class="nav-item" [class.active]="activeTab === 'alertas'" (click)="navigate('alerts', 'alertas')">
      <span class="nav-icon">🔔</span>
      <span class="nav-label">Alertas</span>
    </button>
    <button class="nav-item" [class.active]="activeTab === 'stats'" (click)="navigate('stats', 'stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Stats</span>
    </button>
    <button class="nav-item" [class.active]="activeTab === 'ia'" (click)="navigate('ia', 'ia')">
      <span class="nav-icon">⊙</span>
      <span class="nav-label">IA</span>
    </button>
    <button class="nav-item" [class.active]="activeTab === 'agregar'" (click)="navigate('add-tank', 'agregar')">
      <span class="nav-icon">⊕</span>
      <span class="nav-label">Agregar</span>
    </button>
  </nav>
</div>
